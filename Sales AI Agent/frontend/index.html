<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }
        .header-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #6c63ff 0%, #3f8efc 100%);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .header-text h1 {
            font-size: 17px; font-weight: 700; color: #fff;
        }
        .header-text p {
            font-size: 12px; color: #8888aa; margin-top: 2px;
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #6c63ff, #3f8efc);
            color: #fff;
            border-bottom-right-radius: 6px;
        }
        .message.agent {
            align-self: flex-start;
            background: #1e1e38;
            border: 1px solid rgba(255,255,255,0.06);
            color: #d0d0e8;
            border-bottom-left-radius: 6px;
        }

        /* Typing indicator */
        .typing {
            align-self: flex-start;
            display: none;
            gap: 5px;
            padding: 14px 22px;
            background: #1e1e38;
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .typing.show { display: flex; }
        .typing span {
            width: 8px; height: 8px;
            background: #6c63ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 16px 24px;
            background: #13132a;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #1e1e38;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px 20px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus {
            border-color: #6c63ff;
        }
        .input-area input::placeholder { color: #555570; }

        .input-area button {
            background: linear-gradient(135deg, #6c63ff 0%, #3f8efc 100%);
            border: none;
            border-radius: 14px;
            width: 52px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, opacity 0.2s;
        }
        .input-area button:hover { transform: scale(1.05); }
        .input-area button:active { transform: scale(0.95); }
        .input-area button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .input-area button svg {
            width: 20px; height: 20px; fill: #fff;
        }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #6668aa;
        }
        .welcome h2 { font-size: 20px; color: #9090cc; margin-bottom: 8px; }
        .welcome p { font-size: 13px; line-height: 1.7; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">🏠</div>
        <div class="header-text">
            <h1>Real Estate Agent</h1>
            <p>Find your perfect property in Saudi Arabia</p>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome">
            <h2>Welcome! 👋</h2>
            <p>I'm your real estate assistant. Tell me what you're looking for — <br>
            buying or renting, preferred city, budget, and I'll find the best match for you.</p>
        </div>
    </div>

    <div class="typing" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        const sessionId = crypto.randomUUID();
        const chatContainer = document.getElementById('chatContainer');
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typingIndicator');

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function send() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';
            sendBtn.disabled = true;
            typing.classList.add('show');
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, session_id: sessionId }),
                });
                const data = await res.json();
                typing.classList.remove('show');
                addMessage(data.response, 'agent');
            } catch (err) {
                typing.classList.remove('show');
                addMessage('Sorry, something went wrong. Please try again.', 'agent');
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        sendBtn.addEventListener('click', send);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') send();
        });
        input.focus();
    </script>
</body>
</html>
